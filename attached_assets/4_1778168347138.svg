  <rect x="860" y="1056" width="480" height="76" rx="12" fill="#0F2A2A"/>
  <text x="880" y="1082" font-size="11" font-weight="800" letter-spacing="2" fill="#9AD1CB">EXPORT AS A PAIR</text>
  <text x="880" y="1106" font-size="13" fill="#FFFFFF">Post + image, ready for LinkedIn, X, or your blog. One file.</text>
  <rect x="1190" y="1074" width="140" height="40" rx="20" fill="url(#brandFill)"/>
  <text x="1260" y="1099" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Save As Pair ▸</text>

  
  <g font-size="12" fill="#56706C">
    <text x="40" y="1170" font-weight="800" fill="#0F2A2A">The seamless story:</text>
    <text x="200" y="1170">your post writes itself → the post writes the image brief → the image lands next to the post → both export as one file.</text>
  </g>
