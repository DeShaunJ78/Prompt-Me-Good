  <rect width="1400" height="1140" fill="url(#bg)"/>

  
  <text x="40" y="44" font-size="22" font-weight="800" fill="#0F2A2A">PromptMeGood Workstation — Photography + Image Synergy (with Magic-Link Sign In)</text>
  <text x="40" y="68" font-size="13" fill="#56706C">Pick photo controls on the left → the brief assembles live on the right → generate the image without leaving the page or switching tabs.</text>

  
