  <g font-size="12" fill="#56706C">
    <text x="40" y="1090" font-weight="800" fill="#0F2A2A">What you're seeing:</text>
    <text x="40" y="1110">①  Photography pills on the left = chips on the right. Same data, two views — the columns are visibly linked.</text>
