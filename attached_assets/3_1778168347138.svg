    <text x="1220" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Send Login Link</text>
    <text x="1100" y="346" font-size="10" fill="#9AAFAB">Powered by Supabase Auth · already wired</text>
