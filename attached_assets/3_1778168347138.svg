  <text x="436" y="281" text-anchor="middle" font-size="13" font-weight="700" fill="#0F2A2A">Photography</text>
  <text x="676" y="281" text-anchor="middle" font-size="13" fill="#56706C">Image</text>

  
  <rect x="60" y="316" width="740" height="44" rx="10" fill="#E6F4F1" stroke="#0F766E"/>
  <text x="78" y="343" font-size="13" font-weight="800" fill="#0F2A2A">✨ Help Me Start</text>
  <text x="200" y="343" font-size="12" fill="#0F2A2A">Not sure what you want to shoot? 3 quick questions.</text>
  <rect x="660" y="324" width="124" height="28" rx="14" fill="url(#brandFill)"/>
  <text x="722" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Start In 3 Steps</text>

  
  <text x="60" y="386" font-size="12" font-weight="700" fill="#0F2A2A">Subject &amp; Scene</text>
