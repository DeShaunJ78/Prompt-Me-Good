  <text x="76" y="996" font-size="13" fill="#0F2A2A">Pills selected here flow into the Live Prompt Preview on the right in real time. Click Send To Image</text>
  <text x="76" y="1016" font-size="13" fill="#0F2A2A">Generator and the image appears in the right column too — you never leave the page.</text>
  <text x="76" y="1034" font-size="11" fill="#56706C">Today this is two trips down the page. Tomorrow it's one glance.</text>

  
