  <text x="76" y="424" font-size="13" fill="#0F2A2A">Portrait of a woman walking through a wheat field at golden hour,</text>
  <text x="76" y="444" font-size="13" fill="#0F2A2A">soft warm tones, intimate and natural.</text>

  
