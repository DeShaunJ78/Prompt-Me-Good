  <text x="876" y="340" font-size="13" font-weight="700" fill="#0F2A2A">Cinematic portrait of a woman walking through a wheat</text>
  <text x="876" y="358" font-size="13" font-weight="700" fill="#0F2A2A">field at golden hour. Shot on 35mm, shallow depth of</text>
  <text x="876" y="376" font-size="13" font-weight="700" fill="#0F2A2A">field. Warm tones, soft golden glow, rule-of-thirds</text>
  <text x="876" y="394" font-size="13" font-weight="700" fill="#0F2A2A">composition. Intimate and natural.</text>
  <text x="876" y="416" font-size="12" fill="#9C2E2E">Avoid: harsh shadows, oversaturated, heavy makeup.</text>
