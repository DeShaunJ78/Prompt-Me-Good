<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1080" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F7F6"/>
      <stop offset="1" stop-color="#E7EDEB"/>
    </linearGradient>
    <linearGradient id="brandFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14857C"/>
    </linearGradient>
    <linearGradient id="heroFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6F4F1"/>
      <stop offset="1" stop-color="#D2EAE4"/>
    </linearGradient>
    <linearGradient id="liveFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8E1"/>
      <stop offset="1" stop-color="#FCEFC2"/>
    </linearGradient>
    
      
    
    
  </defs>

  <rect width="1400" height="1080" fill="url(#bg)"/>

  
  <text x="40" y="44" font-size="22" font-weight="800" fill="#0F2A2A">PromptMeGood Workstation v2 — With Help-Me-Start Hero + Live Prompt Preview Bridge</text>
  <text x="40" y="68" font-size="13" fill="#56706C">Help Me Start is now the empty-state hero of the left column. The right column gains a Live Prompt Preview that updates as you type — that's how the two columns marry.</text>

  
  <rect x="40" y="92" width="1320" height="56" rx="14" fill="#FFFFFF" stroke="#D9E2DF"/>
  <rect x="58" y="108" width="28" height="28" rx="6" fill="url(#brandFill)"/>
  <text x="96" y="128" font-size="15" font-weight="800" fill="#0F2A2A">PromptMeGood</text>
  <text x="222" y="128" font-size="13" fill="#56706C">Start Here · Guide · Pricing</text>
  <rect x="1244" y="108" width="100" height="28" rx="14" fill="url(#brandFill)"/>
  <text x="1294" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Sign In</text>

  
  <rect x="40" y="170" width="780" height="830" rx="18" fill="#FFFFFF" stroke="#D9E2DF"/>

  <text x="60" y="200" font-size="11" font-weight="800" letter-spacing="2" fill="#0F766E">SHAPE YOUR PROMPT</text>
  <text x="60" y="226" font-size="22" font-weight="800" fill="#0F2A2A">What are you making today?</text>

  
  <rect x="60" y="252" width="740" height="48" rx="12" fill="#F2F6F5" stroke="#D9E2DF"/>
  <rect x="68" y="260" width="240" height="32" rx="8" fill="#FFFFFF" stroke="#0F766E" stroke-width="1.5"/>
  <text x="188" y="281" text-anchor="middle" font-size="13" font-weight="700" fill="#0F2A2A">Text Prompt</text>
  <text x="412" y="281" text-anchor="middle" font-size="13" fill="#56706C">Photography</text>
  <text x="616" y="281" text-anchor="middle" font-size="13" fill="#56706C">Image</text>

  
  <rect x="60" y="320" width="740" height="86" rx="14" fill="url(#heroFill)" stroke="#0F766E"/>
  <circle cx="98" cy="363" r="20" fill="#FFFFFF" stroke="#0F766E" stroke-width="1.5"/>
  <text x="98" y="370" text-anchor="middle" font-size="20">✨</text>
  <text x="134" y="354" font-size="14" font-weight="800" fill="#0F2A2A">Help Me Start  <tspan font-weight="500" fill="#56706C" font-size="12">— the friction killer</tspan></text>
  <text x="134" y="374" font-size="12" fill="#0F2A2A">Don't know where to begin? Answer 3 quick questions and we'll write the prompt with you.</text>
  <text x="134" y="392" font-size="11" fill="#56706C">Pinned here at all times. When the goal box is empty, this card grows to fill the workspace (see inset →).</text>
  <rect x="660" y="346" width="124" height="34" rx="17" fill="url(#brandFill)"/>
  <text x="722" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Start In 3 Steps</text>

  
  <text x="60" y="436" font-size="12" font-weight="700" fill="#0F2A2A">Your Goal</text>
  <rect x="60" y="446" width="740" height="86" rx="10" fill="#FAFCFB" stroke="#D9E2DF"/>
  <text x="76" y="474" font-size="13" fill="#0F2A2A">Write a LinkedIn post about our new product launch — friendly, confident,</text>
  <text x="76" y="494" font-size="13" fill="#0F2A2A">about 150 words, with one question at the end to start a conversation.</text>
  <rect x="688" y="500" width="98" height="22" rx="11" fill="#0F766E"/>
  <text x="737" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Strong ✓</text>

  
  <text x="60" y="562" font-size="12" font-weight="700" fill="#0F2A2A">Quick Actions</text>
  <g font-size="12" fill="#0F2A2A">
    <rect x="60" y="574" width="148" height="34" rx="17" fill="url(#brandFill)"/>
    <text x="134" y="596" text-anchor="middle" fill="#FFFFFF" font-weight="700">Fix My Prompt</text>
    <rect x="216" y="574" width="148" height="34" rx="17" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="290" y="596" text-anchor="middle">More Detailed</text>
    <rect x="372" y="574" width="148" height="34" rx="17" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="446" y="596" text-anchor="middle">Bold &amp; Direct</text>
    <rect x="528" y="574" width="148" height="34" rx="17" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="602" y="596" text-anchor="middle">Beginner</text>
    <rect x="684" y="574" width="116" height="34" rx="17" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="742" y="596" text-anchor="middle">Undo</text>
  </g>

  
  <text x="60" y="640" font-size="12" font-weight="700" fill="#0F2A2A">Tuning</text>
  <g font-size="11" fill="#56706C">
    <rect x="60" y="652" width="86" height="30" rx="15" fill="#0F766E"/>
    <text x="103" y="671" text-anchor="middle" fill="#FFFFFF" font-weight="700">Friendly</text>
    <rect x="154" y="652" width="86" height="30" rx="15" fill="#0F766E"/>
    <text x="197" y="671" text-anchor="middle" fill="#FFFFFF" font-weight="700">Confident</text>
    <rect x="248" y="652" width="86" height="30" rx="15" fill="#F2F6F5" stroke="#D9E2DF"/>
    <text x="291" y="671" text-anchor="middle">Concise</text>
    <rect x="342" y="652" width="86" height="30" rx="15" fill="#F2F6F5" stroke="#D9E2DF"/>
    <text x="385" y="671" text-anchor="middle">Detailed</text>
    <rect x="436" y="652" width="120" height="30" rx="8" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="448" y="671" font-size="11" fill="#0F2A2A">Length: 150 ▾</text>
  </g>

  
  <rect x="60" y="708" width="740" height="80" rx="12" fill="#0F2A2A"/>
  <text x="80" y="738" font-size="12" font-weight="700" fill="#9AD1CB">RUN WITH AI</text>
  <text x="80" y="764" font-size="14" fill="#FFFFFF">Send to ChatGPT, Claude, Perplexity, Gemini — or run it here.</text>
  <rect x="640" y="728" width="140" height="40" rx="20" fill="url(#brandFill)"/>
  <text x="710" y="753" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Run With AI ▸</text>

  
  <rect x="60" y="806" width="740" height="172" rx="12" fill="#FAFCFB" stroke="#D9E2DF" stroke-dasharray="4 4"/>
  <text x="76" y="832" font-size="11" font-weight="800" letter-spacing="2" fill="#0F766E">HIDDEN UNTIL TAB IS CLICKED</text>
  <text x="76" y="858" font-size="13" fill="#0F2A2A"><tspan font-weight="700">Photography tab:</tspan> Style · Camera &amp; Lens · Lighting · Composition · Color Palette,</text>
  <text x="76" y="878" font-size="13" fill="#0F2A2A">Surprise Me, Avoid pills, one-tap Send To Image Generator.</text>
  <text x="76" y="914" font-size="13" fill="#0F2A2A"><tspan font-weight="700">Image tab:</tspan> DALL·E 3 generation, Regenerate, Use As Reference, Download.</text>
  <text x="76" y="950" font-size="11" fill="#56706C">Same controls you have today — one mode visible at a time.</text>

  
  <g>
    <line x1="824" y1="500" x2="836" y2="500" stroke="#0F766E" stroke-width="2"/>
    <line x1="824" y1="600" x2="836" y2="600" stroke="#0F766E" stroke-width="2"/>
    <line x1="824" y1="700" x2="836" y2="700" stroke="#0F766E" stroke-width="2"/>
    <text x="830" y="530" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1" fill="#0F766E" transform="rotate(-90 830 530)">LIVE LINK</text>
  </g>

  
  <rect x="840" y="170" width="520" height="830" rx="18" fill="#FFFFFF" stroke="#D9E2DF"/>
  <text x="860" y="200" font-size="11" font-weight="800" letter-spacing="2" fill="#0F766E">SEE THE RESULT</text>
  <text x="860" y="226" font-size="22" font-weight="800" fill="#0F2A2A">Adaptive Response</text>
  
  <g font-size="11">
    <rect x="860" y="240" width="80" height="22" rx="11" fill="#0F766E"/>
    <text x="900" y="255" text-anchor="middle" fill="#FFFFFF" font-weight="700">Friendly</text>
    <rect x="948" y="240" width="86" height="22" rx="11" fill="#0F766E"/>
    <text x="991" y="255" text-anchor="middle" fill="#FFFFFF" font-weight="700">Confident</text>
    <rect x="1042" y="240" width="76" height="22" rx="11" fill="#F2F6F5" stroke="#D9E2DF"/>
    <text x="1080" y="255" text-anchor="middle" fill="#0F2A2A">150 words</text>
    <rect x="1126" y="240" width="92" height="22" rx="11" fill="#F2F6F5" stroke="#D9E2DF"/>
    <text x="1172" y="255" text-anchor="middle" fill="#0F2A2A">For LinkedIn</text>
    <text x="1224" y="255" font-size="10" fill="#56706C">← mirrors your tuning</text>
  </g>

  
  <rect x="860" y="276" width="480" height="208" rx="12" fill="url(#liveFill)" stroke="#D4A82A"/>
  <circle cx="876" cy="296" r="5" fill="#D4A82A">
    
  </circle>
  <text x="892" y="300" font-size="11" font-weight="800" letter-spacing="2" fill="#8A6A0A">LIVE PROMPT PREVIEW · UPDATES AS YOU TYPE</text>
  <text x="876" y="328" font-size="12" fill="#5A4A0A" font-style="italic">Built from your goal + tabs + tuning. No "Run" needed to see this.</text>

  <text x="876" y="356" font-size="13" font-weight="700" fill="#0F2A2A">You are a friendly, confident copywriter.</text>
  <text x="876" y="376" font-size="13" fill="#0F2A2A">Write a 150-word LinkedIn post about our new product</text>
  <text x="876" y="394" font-size="13" fill="#0F2A2A">launch. Open with a hook, give two concrete benefits,</text>
  <text x="876" y="412" font-size="13" fill="#0F2A2A">end with one open question to start a conversation.</text>
  <text x="876" y="430" font-size="13" fill="#0F2A2A">Tone: friendly + confident. Avoid jargon and hype.</text>

  <g font-size="11">
    <rect x="876" y="446" width="76" height="26" rx="13" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="914" y="463" text-anchor="middle" fill="#0F2A2A">Copy</text>
    <rect x="958" y="446" width="84" height="26" rx="13" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="1000" y="463" text-anchor="middle" fill="#0F2A2A">Open In ▾</text>
    <text x="1052" y="463" font-size="10" fill="#56706C">~ 84 tokens · ChatGPT-ready</text>
  </g>

  
  <rect x="860" y="500" width="480" height="200" rx="12" fill="#FAFCFB" stroke="#D9E2DF"/>
  <text x="876" y="524" font-size="11" font-weight="800" letter-spacing="2" fill="#56706C">AI RESPONSE</text>
  <text x="1304" y="524" text-anchor="end" font-size="10" fill="#9AAFAB">appears after Run With AI</text>
  <text x="876" y="552" font-size="13" fill="#0F2A2A">Big news — we just shipped something we've been quietly</text>
  <text x="876" y="572" font-size="13" fill="#0F2A2A">building for months. It turns vague prompt ideas into clear</text>
  <text x="876" y="592" font-size="13" fill="#0F2A2A">instructions in seconds…</text>
  <text x="876" y="616" font-size="12" fill="#56706C">[…response continues…]</text>
  <g font-size="11" fill="#0F2A2A">
    <rect x="876" y="640" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="914" y="659" text-anchor="middle">Copy</text>
    <rect x="958" y="640" width="92" height="30" rx="15" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="1004" y="659" text-anchor="middle">Save Prompt</text>
    <rect x="1056" y="640" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#D9E2DF"/>
    <text x="1094" y="659" text-anchor="middle">Share</text>
    <rect x="1140" y="640" width="120" height="30" rx="15" fill="url(#brandFill)"/>
    <text x="1200" y="659" text-anchor="middle" fill="#FFFFFF" font-weight="700">Run Again</text>
  </g>

  
  <rect x="860" y="716" width="480" height="148" rx="12" fill="#FAFCFB" stroke="#D9E2DF"/>
  <text x="876" y="740" font-size="11" font-weight="800" letter-spacing="2" fill="#56706C">IMAGE PREVIEW</text>
  <rect x="876" y="754" width="120" height="100" rx="8" fill="#E7EDEB"/>
  <text x="936" y="810" text-anchor="middle" font-size="11" fill="#9AAFAB">[ image ]</text>
  <text x="1016" y="780" font-size="12" fill="#0F2A2A">Empty until you generate.</text>
  <text x="1016" y="800" font-size="12" fill="#56706C">Switch to Image tab on the</text>
  <text x="1016" y="818" font-size="12" fill="#56706C">left for DALL·E 3.</text>

  
  <rect x="860" y="880" width="480" height="100" rx="12" fill="#FAFCFB" stroke="#D9E2DF"/>
  <text x="876" y="904" font-size="11" font-weight="800" letter-spacing="2" fill="#56706C">RECENT VAULT</text>
  <text x="1308" y="904" text-anchor="end" font-size="11" fill="#0F766E" font-weight="700">View All ▸</text>
  <line x1="876" y1="916" x2="1324" y2="916" stroke="#E7EDEB"/>
  <text x="876" y="938" font-size="13" fill="#0F2A2A">LinkedIn launch post · friendly, confident</text>
  <text x="1308" y="938" text-anchor="end" font-size="11" fill="#9AAFAB">just now</text>
  <text x="876" y="962" font-size="13" fill="#0F2A2A">Cold-email to enterprise lead</text>
  <text x="1308" y="962" text-anchor="end" font-size="11" fill="#9AAFAB">2 hr</text>

  
  <text x="40" y="1024" font-size="11" font-weight="800" letter-spacing="2" fill="#0F766E">INSET — WHAT IT LOOKS LIKE WHEN THE GOAL BOX IS EMPTY (FIRST-TIME USER)</text>
  <rect x="40" y="1032" width="600" height="40" rx="10" fill="url(#heroFill)" stroke="#0F766E"/>
  <text x="60" y="1058" font-size="13" font-weight="800" fill="#0F2A2A">✨ Help Me Start —</text>
  <text x="208" y="1058" font-size="12" fill="#0F2A2A">3 quick questions and we'll write your prompt with you.</text>
  <rect x="500" y="1040" width="124" height="24" rx="12" fill="url(#brandFill)"/>
  <text x="562" y="1057" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Start In 3 Steps</text>

  <text x="660" y="1048" font-size="11" fill="#56706C">When goal is empty, the hero card becomes the dominant element of the left column.</text>
  <text x="660" y="1064" font-size="11" fill="#56706C">Once content exists, it shrinks to the slim card you see above. Always present, never blocking.</text>
</svg>