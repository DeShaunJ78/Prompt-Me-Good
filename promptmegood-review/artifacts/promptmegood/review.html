<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PromptMeGood — Code Review (Dev Only)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111827;
      padding: 32px 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 0.9rem; color: #6b7280; margin-bottom: 28px; }
    .run-btn {
      background: #1a6b5e;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .run-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    #scores {
      display: none;
      gap: 12px;
      margin: 24px 0 8px;
      flex-wrap: wrap;
    }
    .score-card {
      flex: 1;
      min-width: 120px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }
    .score-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; }
    .score-value { font-size: 2rem; font-weight: 700; margin-top: 4px; }
    .score-value.good    { color: #059669; }
    .score-value.ok      { color: #d97706; }
    .score-value.poor    { color: #dc2626; }

    #summary-box {
      display: none;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #374151;
    }

    .issues-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .issue-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .issue-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge.bugs     { background: #fee2e2; color: #991b1b; }
    .badge.ux       { background: #dbeafe; color: #1e40af; }
    .badge.security { background: #fef3c7; color: #92400e; }
    .badge.polish   { background: #f3f4f6; color: #374151; }
    .badge.critical { background: #dc2626; color: white; }
    .badge.high     { background: #f97316; color: white; }
    .badge.medium   { background: #fbbf24; color: #78350f; }
    .badge.low      { background: #e5e7eb; color: #374151; }
    .issue-location { font-size: 0.78rem; color: #6b7280; font-family: monospace; }
    .issue-problem  { font-size: 0.88rem; line-height: 1.55; color: #374151; margin-bottom: 10px; }
    .fix-toggle {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #374151;
      transition: background 0.15s;
    }
    .fix-toggle:hover { background: #f3f4f6; }
    .fix-code {
      display: none;
      margin-top: 10px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.82rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }
    .copy-btn {
      font-size: 0.78rem;
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 8px;
    }
    .copy-btn:hover { background: #1e293b; }
    #status { font-size: 0.85rem; color: #6b7280; margin-top: 12px; min-height: 20px; }
    #raw-stream {
      display: none;
      margin-top: 20px;
      background: #0f172a;
      color: #94a3b8;
      padding: 14px 16px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    .section-title { font-size: 0.8rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 8px; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 9999px;
      font-size: 0.8rem;
      border: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #1a6b5e; color: white; border-color: #1a6b5e; }
  </style>
</head>
<body>

<h1>Code Review</h1>
<p class="subtitle">Sends the api-server + index.html source to Claude (claude-sonnet-4-6) for a structured review. Dev only — the endpoint returns 403 in production.</p>

<button class="run-btn" id="runBtn" onclick="runReview()">Run Review</button>
<div id="status"></div>

<div id="scores"></div>
<div id="summary-box"></div>

<div id="results"></div>

<p class="section-title" id="stream-label" style="display:none">Raw stream</p>
<div id="raw-stream"></div>

<script>
let allIssues = [];
let activeFilter = 'all';

async function runReview() {
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  const rawStream = document.getElementById('raw-stream');
  const streamLabel = document.getElementById('stream-label');

  btn.disabled = true;
  btn.textContent = 'Reviewing…';
  status.textContent = 'Collecting files and sending to Claude…';
  document.getElementById('results').innerHTML = '';
  document.getElementById('scores').style.display = 'none';
  document.getElementById('summary-box').style.display = 'none';
  rawStream.textContent = '';
  rawStream.style.display = 'block';
  streamLabel.style.display = 'block';

  let fullText = '';
  let buffer = '';

  try {
    const res = await fetch('/api/review', { method: 'POST', headers: { 'Accept': 'text/event-stream' } });
    if (!res.ok) {
      let err = {};
      try { err = await res.json(); } catch (_) {}
      status.textContent = err.error || ('Review endpoint returned HTTP ' + res.status + '.');
      btn.disabled = false;
      btn.textContent = 'Run Review';
      return;
    }
    if (!res.body) {
      status.textContent = 'Streaming is not supported in this browser.';
      btn.disabled = false;
      btn.textContent = 'Run Review';
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let terminated = false;

    while (!terminated) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      buffer = buffer.replace(/\r\n/g, '\n');
      let idx;
      while ((idx = buffer.indexOf('\n\n')) !== -1) {
        const event = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        const lines = event.split('\n').filter(Boolean);
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const raw = line.slice(5).trim();
          if (!raw) continue;
          if (raw === '[DONE]') {
            terminated = true;
            try { reader.cancel(); } catch (_) {}
            status.textContent = 'Review complete.';
            parseAndRender(fullText);
            break;
          }
          try {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed.text === 'string') {
              fullText += parsed.text;
              rawStream.textContent = fullText.slice(-1200);
              rawStream.scrollTop = rawStream.scrollHeight;
              status.textContent = 'Receiving… (' + fullText.length + ' chars)';
            } else if (parsed && parsed.error) {
              status.textContent = String(parsed.error);
            }
          } catch (_) {
            // Tolerate malformed event lines silently — never break the stream.
          }
        }
        if (terminated) break;
      }
    }
  } catch (err) {
    status.textContent = 'Connection error: ' + (err && err.message ? err.message : 'unknown');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Review Again';
  }
}

function parseAndRender(text) {
  const clean = text.replace(/```json|```/g, '').trim();
  let data;
  try {
    data = JSON.parse(clean);
  } catch (e) {
    document.getElementById('results').innerHTML =
      '<p style="color:#dc2626;margin-top:16px">Could not parse Claude\u2019s response as JSON. Raw output is shown in the stream below.</p>';
    return;
  }

  allIssues = Array.isArray(data.issues) ? data.issues : [];

  const scores = data.score || {};
  const scoreEl = document.getElementById('scores');
  scoreEl.style.display = 'flex';
  scoreEl.innerHTML = Object.entries(scores).map(function (entry) {
    var key = entry[0];
    var val = Number(entry[1]) || 0;
    var cls = val >= 8 ? 'good' : val >= 5 ? 'ok' : 'poor';
    return '<div class="score-card">' +
             '<div class="score-label">' + escHtml(key) + '</div>' +
             '<div class="score-value ' + cls + '">' + val + '/10</div>' +
           '</div>';
  }).join('');

  const summaryEl = document.getElementById('summary-box');
  if (data.summary) {
    summaryEl.textContent = data.summary;
    summaryEl.style.display = 'block';
  }

  renderIssues('all');
}

function renderIssues(filter) {
  activeFilter = filter;
  const container = document.getElementById('results');
  const issues = filter === 'all' ? allIssues : allIssues.filter(function (i) { return i.area === filter; });
  const counts = { all: allIssues.length };
  for (var k = 0; k < allIssues.length; k++) {
    var a = allIssues[k].area;
    counts[a] = (counts[a] || 0) + 1;
  }

  const filterBtns = ['all','bugs','ux','security','polish'].map(function (f) {
    var label = f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1);
    var count = counts[f] ? ' (' + counts[f] + ')' : '';
    var active = activeFilter === f ? ' active' : '';
    return '<button class="filter-btn' + active + '" onclick="renderIssues(\'' + f + '\')">' +
             label + count +
           '</button>';
  }).join('');

  const issueCards = issues.map(function (issue, idx) {
    return '<div class="issue-card">' +
             '<div class="issue-header">' +
               '<span class="badge ' + escAttr(issue.area) + '">' + escHtml(issue.area || '') + '</span>' +
               '<span class="badge ' + escAttr(issue.severity) + '">' + escHtml(issue.severity || '') + '</span>' +
               '<span class="issue-location">' + escHtml((issue.file || '') + ' \u2014 ' + (issue.location || '')) + '</span>' +
             '</div>' +
             '<p class="issue-problem">' + escHtml(issue.problem || '') + '</p>' +
             '<button class="fix-toggle" onclick="toggleFix(' + idx + ')">Show fix</button>' +
             '<div class="fix-code" id="fix-' + idx + '">' + escHtml(issue.fix || '') + '</div>' +
             '<button class="copy-btn" style="display:none" id="copy-' + idx + '" onclick="copyFix(' + idx + ')">Copy fix</button>' +
           '</div>';
  }).join('');

  container.innerHTML =
    '<p class="section-title">' + issues.length + ' issue' + (issues.length !== 1 ? 's' : '') + '</p>' +
    '<div class="filter-bar">' + filterBtns + '</div>' +
    '<div class="issues-list">' + (issueCards || '<p style="color:#6b7280;font-size:0.9rem">No issues in this category.</p>') + '</div>';
}

function toggleFix(idx) {
  const fixEl = document.getElementById('fix-' + idx);
  const copyEl = document.getElementById('copy-' + idx);
  const btn = fixEl.previousElementSibling;
  const isHidden = fixEl.style.display === 'none' || !fixEl.style.display;
  fixEl.style.display = isHidden ? 'block' : 'none';
  copyEl.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? 'Hide fix' : 'Show fix';
}

function copyFix(idx) {
  const text = document.getElementById('fix-' + idx).textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copy-' + idx);
  btn.textContent = 'Copied!';
  setTimeout(function () { btn.textContent = 'Copy fix'; }, 1500);
}

function escHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
function escAttr(str) {
  return String(str == null ? '' : str).replace(/[^a-z0-9_-]/gi, '');
}
</script>
</body>
</html>
