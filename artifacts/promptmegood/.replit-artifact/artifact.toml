kind = "web"
previewPath = "/"
title = "PromptMeGood"
version = "1.0.0"
id = "artifacts/promptmegood"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20882

[services.development]
run = "pnpm --filter @workspace/promptmegood run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/promptmegood", "run", "build"]

[services.production.build.env]
PORT = "20882"
BASE_PATH = "/"

[services.production.run]
args = ["node", "artifacts/promptmegood/server.mjs"]

[services.production.run.env]
PORT = "20882"
NODE_ENV = "production"

[services.env]
PORT = "20882"
BASE_PATH = "/"
